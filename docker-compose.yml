services:
  backend:
    build:
      context: ./backend
    container_name: breast-pcr-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PCR_SECRET_KEY=course-demo-secret-change-in-prod

  frontend:
    build:
      context: ./frontend
    container_name: breast-pcr-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
